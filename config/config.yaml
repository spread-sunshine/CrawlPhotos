face_recognition:
  baidu:
    api_key: ${BAIDU_API_KEY}
    app_id: ${BAIDU_APP_ID}
    group_id: baby_photos_group
    secret_key: ${BAIDU_SECRET_KEY}
  insight_face_local:
    confidence_threshold: 0.8
    device: cpu
    model_cache_dir: data/models
    model_name: buffalo_l
    use_faiss: false
  provider: insight_face_local
  targets:
  - enabled: true
    min_confidence: 0.8
    name: 宝贝女儿
    reference_photos_dir: config/reference_photos/daughter/
  tencent_cloud:
    group_id: baby_photos_group
    region: ap-guangzhou
    secret_id: ${TENCENT_SECRET_ID}
    secret_key: ${TENCENT_SECRET_KEY}
logging:
  directory: logs
  level: INFO
  max_file_size_mb: 50
  retention_days: 90
notification:
  daily_summary: true
  enabled: false
  notify_on_error: true
  notify_on_new_photo: true
  summary_time: '21:00'
  type: wechat
  wechat:
    app_id: ${WECHAT_APP_ID}
    app_secret: ${WECHAT_APP_SECRET}
    receiver_openid: ''
    template_id_error: ''
    template_id_new_photo: ''
    template_id_summary: ''
qq:
  group:
    album_id: ''
    cookies_file: data/qq_cookies.txt
    group_id: '1059031534'
  personal:
    album_prefix: '{year}.{month}'
    enabled: false
    visibility: self_only
scheduler:
  cron_expression: 0 */30 * * * *
  scan_days_back: 7
  startup_scan: true
source:
  local_directory:
    path: d:\ugit\Test\CrawlPhotos\output/
    recursive: true
  type: local_directory
storage:
  directory_format: '{root}/{year}/{month_num}_{month_name}/{date}'
  filename_format: '{date}_{seq:04d}_qqgroup.{ext}'
  retain_original_filename: true
  root_directory: ./output
